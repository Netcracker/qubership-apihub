# Secret for PostgreSQL admin credentials (used by pg-init job to create superset db)
# Matches postgres-db default: postgres/postgres
apiVersion: v1
kind: Secret
metadata:
  name: apache-superset-pg-admin
  labels:
    app.kubernetes.io/name: apache-superset
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  username: {{ .Values.pgInit.adminUser | default "postgres" | quote }}
  password: {{ .Values.pgInit.adminPassword | default "postgres" | quote }}
