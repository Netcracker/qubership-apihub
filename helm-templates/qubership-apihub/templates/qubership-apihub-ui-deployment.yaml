---
kind: Deployment
apiVersion: apps/v1
metadata:
    name: qubership-apihub-ui
    labels:
        name: qubership-apihub-ui
        app.kubernetes.io/name: 'qubership-apihub-ui'
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: qubership-apihub
        app.kubernetes.io/managed-by: helm
        app.kubernetes.io/technology: 'nginx'
spec:
    selector:
        matchLabels:
          name: qubership-apihub-ui
    replicas: {{ .Values.qubershipApihubUi.replicas }}
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxSurge: 25%
            maxUnavailable: 25%
    template:
        metadata:
            labels:
                name: qubership-apihub-ui
                app.kubernetes.io/name: 'qubership-apihub-ui'
                app.kubernetes.io/component: frontend
                app.kubernetes.io/part-of: qubership-apihub
                app.kubernetes.io/managed-by: helm
                app.kubernetes.io/technology: 'nginx'
        spec:
            restartPolicy: Always
            terminationGracePeriodSeconds: 30
            dnsPolicy: ClusterFirst
            hostPID: false
            hostIPC: false
            initContainers:
            -   name: init-nginx-config
                image: '{{ .Values.qubershipApihubUi.image.repository }}:{{ .Values.qubershipApihubUi.image.tag }}'
                command:
                    - sh
                    - -c
                    - cp -rL /etc/nginx/. /mnt/nginx-etc/
                volumeMounts:
                -   name: nginx-etc
                    mountPath: /mnt/nginx-etc
                securityContext:
                    runAsUser: 10001
                    runAsGroup: 10001
                    runAsNonRoot: true
                    readOnlyRootFilesystem: true
                    allowPrivilegeEscalation: false
            volumes:
            -   name: nginx-etc
                emptyDir: {}
            -   name: nginx-cache
                emptyDir: {}
            -   name: nginx-run
                emptyDir: {}
            containers:
            -   name: 'qubership-apihub-ui'
                image: '{{ .Values.qubershipApihubUi.image.repository }}:{{ .Values.qubershipApihubUi.image.tag }}'
                ports:
                -   name: web
                    containerPort: 8080
                    protocol: TCP
                env:
                - name: APIHUB_BACKEND_ADDRESS
                  value: '{{ .Values.qubershipApihubUi.env.apihubBackendAddress }}'
                - name: APIHUB_NC_SERVICE_ADDRESS
                  value: '{{ .Values.qubershipApihubUi.env.apihubNcServiceAddress }}'
                - name: API_LINTER_SERVICE_ADDRESS
                  value: '{{ .Values.qubershipApihubUi.env.apiLinterServiceAddress }}'
                - name: APIHUB_AGENTS_BACKEND_ADDRESS
                  value: '{{ .Values.qubershipApihubUi.env.apihubAgentsBackendAddress }}'
                resources:
                    requests:
                        cpu: '{{ .Values.qubershipApihubUi.resource.cpu.request }}'
                        memory: '{{ .Values.qubershipApihubUi.resource.memory.request }}'
                    limits:
                        memory: '{{ .Values.qubershipApihubUi.resource.memory.limit }}'
                        cpu: {{ .Values.qubershipApihubUi.resource.cpu.limit }}
                volumeMounts:
                -   name: nginx-etc
                    mountPath: /etc/nginx
                -   name: nginx-cache
                    mountPath: /var/cache/nginx
                -   name: nginx-run
                    mountPath: /var/run
                livenessProbe:
                  httpGet:
                    path: /probes/live
                    port: web
                  initialDelaySeconds: 5
                  timeoutSeconds: 15
                readinessProbe:
                  httpGet:
                    path: /probes/ready
                    port: web
                  initialDelaySeconds: 5
                securityContext:
                    runAsUser: 10001
                    runAsGroup: 10001
                    readOnlyRootFilesystem: true
                    runAsNonRoot: true
                    seccompProfile:
                        type: RuntimeDefault
                    allowPrivilegeEscalation: false
                    capabilities:
                        drop:
                          - ALL
    revisionHistoryLimit: 3
